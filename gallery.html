<!DOCTYPE html>
<html>
<head>
<title>Gallery - POWER FITNESS GYM UNA</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000,#222);
color:white;
}

header{
background:linear-gradient(90deg,yellow,orange);
padding:20px;
text-align:center;
}

h1{
font-size:50px;
letter-spacing:4px;
color:black;
text-transform:uppercase;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white; }
to{ text-shadow:0 0 25px red; }
}

/* NAV MENU */
nav{
margin-top:15px;
}

nav a{
text-decoration:none;
background:white;
color:black;
padding:10px 15px;
margin:5px;
border-radius:20px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
background:black;
color:yellow;
transform:scale(1.1);
}

/* SLIDER */
.slider{
width:90%;
max-width:900px;
height:500px;
margin:40px auto;
position:relative;
overflow:hidden;
border-radius:10px;
}

.slide{
display:none;
width:100%;
height:100%;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* BUTTONS */
.prev, .next{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:25px;
background:yellow;
border:none;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.prev{ left:10px; }
.next{ right:10px; }

.prev:hover, .next:hover{
background:orange;
}

footer{
background:black;
padding:15px;
text-align:center;
color:yellow;
}

</style>

</head>

<body>

<header>

<h1>POWER FITNESS GYM UNA</h1>

<nav>
<a href="index.html">Home</a>
<a href="aboutgym.html">About Gym</a>
<a href="services.html">Services</a>
<a href="trainers.html">Trainers</a>
<a href="membership.html">Membership</a>
<a href="dietplans.html">DietPlans</a>
<a href="gallery.html">Gallery</a>
<a href="Contactus.html">Contact Us</a>
<a href="JoinNow.html">Join Now</a>

</nav>
</header>

<div class="slider">

<div class="slide">
<img src="gym  photo 1.jpeg">
</div>

<div class="slide">
<img src="gym  photo 2.jpeg">
</div>

<div class="slide">
<img src="gym  photo 3.jpeg">
</div>

<div class="slide">
<img src="gym  photo 4.jpeg">
</div>

<div class="slide">
<img src="gym  photo 5.jpeg">
</div>

<button class="prev" onclick="prevSlide()">❮</button>
<button class="next" onclick="nextSlide()">❯</button>

</div>

<footer>
© 2026 POWER FITNESS GYM UNA
</footer>

<script>

let index = 0;
let slides = document.getElementsByClassName("slide");

showSlide(index);

setInterval(function(){
nextSlide();
},3000);

function showSlide(n){
if(n >= slides.length){ index = 0; }
if(n < 0){ index = slides.length - 1; }

for(let i=0; i<slides.length; i++){
slides[i].style.display = "none";
}

slides[index].style.display = "block";
}

function nextSlide(){
index++;
showSlide(index);
}

function prevSlide(){
index--;
showSlide(index);
}

</script>

</body>
</html>
